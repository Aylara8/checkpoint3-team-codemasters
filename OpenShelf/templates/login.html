{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm border-0 mt-5" style="border-radius: 15px;">
                <div class="card-body p-5 text-center">
                    <h3 class="fw-bold mb-3">Welcome Back</h3>
                    <p class="text-muted mb-4 small">Please enter your details to continue</p>
                    
                    <form method="POST">
                        <div class="mb-3 text-start">
                            <label class="form-label small fw-bold">Email</label>
                            <input type="email" name="username" class="form-control" placeholder="name@example.com" required>
                        </div>
                        
                        <div class="mb-4 text-start">
                            <label class="form-label small fw-bold">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>

                        {% if show_captcha %}
                        <div class="mb-4 p-3 bg-light rounded border text-start">
                            <label class="form-label fw-bold text-danger small"><i class="bi bi-shield-check me-1"></i> Security Check</label>
                            <p class="mb-2" style="font-size: 0.9rem;">{{ session['captcha_text'] }}</p>
                            <input type="number" name="captcha_answer" class="form-control form-control-sm" placeholder="Your answer" required>
                        </div>
                        {% endif %}

                        <button type="submit" class="btn btn-dark w-100 py-2 shadow-sm" style="border-radius: 8px;">
                            Sign In
                        </button>
                    </form>
                    
                    <div class="mt-4">
                        <p class="small text-muted">Don't have an account? <a href="{{ url_for('signup') }}" class="text-primary text-decoration-none">Create one</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
